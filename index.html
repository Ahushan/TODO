<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
  </head>
  <body>
    <div class="todo-app">
      <div class="container">
        <section class="list-container">
          <div class="headers">
            <h1>My List . . .</h1>
            <div class="data-handler">
              <input
                type="text"
                class="list-input"
                placeholder="add list"
              />
              <button class="list-add-btn" onclick="addTask()">ADD</button>
            </div>
          </div>
          <div class="list-scroll">
            <ul class="todo-list" id="todoList">
              <!--  -->
            </ul>
          </div>
        </section>
      </div>
      <div class="container">
        <section class="goals-container">
          <div class="headers">
            <h1>Goals . . .</h1>
            <div class="goal-data-handler">
              <input type="text" class="goal-input" placeholder="add goals" />
              <button class="list-add-btn" onclick="addGoal()">ADD</button>
            </div>
          </div>
          <div class="list-scroll">
            <ul class="goal-list" id="goalList">
              <!--  -->
            </ul>
          </div>
        </section>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
