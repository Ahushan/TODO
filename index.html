<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>My To-Do List</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
  </head>

  <body>
    <main class="todo-app">


      <div class="container">
        <section class="list-container">

          <div class="headers">
            <h1>My Tasks</h1>

            <div class="data-handler">

              <input
                id="taskInput"
                type="text"
                class="list-input"
                placeholder="Add a new task..."
              />

              <button class="list-add-btn" onclick="addTask()">
                <span class="material-icons">add</span>
                Add
              </button>

            </div>
          </div>

          <div class="list-scroll">
            <ul class="todo-list" id="todoList"></ul>
          </div>

        </section>
      </div>


      <div class="container">
        <section class="goals-container">

          <div class="headers">

            <h1>My Goals</h1>

            <div class="goal-data-handler">

              <input
                id="goalInput"
                type="text"
                class="goal-input"
                placeholder="Add a new goal..."
              />

              <button class="list-add-btn" onclick="addGoal()">
                <span class="material-icons">add</span>
                Add
              </button>

            </div>

          </div>

          <div class="list-scroll">
            <ul class="goal-list" id="goalList"></ul>
          </div>

        </section>
      </div>

    </main>

    <script src="script.js"></script>
  </body>
</html>
